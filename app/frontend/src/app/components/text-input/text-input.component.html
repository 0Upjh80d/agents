<div class="input-text-container">
  <form class="flex-form">
    <textarea
      id="text-input"
      placeholder="Ask me a health-related question..."
      class="textarea"
      maxlength="1000"
      rows="1"
    ></textarea>
    <button
      id="text-input-form-submission"
      type="button"
      class="send-button"
      disabled="isSendingOrReceiving"
    >
      Send
    </button>
  </form>
</div>
